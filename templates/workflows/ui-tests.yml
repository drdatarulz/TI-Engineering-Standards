# UI tier (Playwright) — NOT a per-PR gate. Runs at the orchestration boundary and on
# demand via workflow_dispatch on the self-hosted runner. See standards/testing.md.
#
# Fired two ways:
#   * scoped     — pass `filter` (e.g. a story's tests, or "CriticalPath=true") for the
#                  per-story authoring run and critical-path smoke set.
#   * unfiltered — leave `filter` empty for the end-of-batch full regression sweep.
#
# FILL IN (see templates/workflows/README.md):
#   {ProjectName} → solution/project name
#   {PROJECT}     → uppercase env-var prefix (e.g. FORMIT)
#   ports / health paths below → match your docker-compose client + API ports.
name: ui-tests

on:
  workflow_dispatch:
    inputs:
      ref:
        # Left empty on purpose: GitHub REJECTS a context expression in a workflow_dispatch
        # input `default` ("no context is available here") — it fails the whole file to parse.
        # The dispatched-ref fallback is resolved in the checkout step below via
        # `inputs.ref || github.ref_name`, where the github context IS available. So
        # `gh workflow run --ref <branch>` checks out that branch with no extra flag, and
        # `-f ref=<x>` still overrides. See templates/workflows/README.md.
        description: Branch or SHA to test (empty = the dispatched ref)
        required: false
        default: ''
      filter:
        description: 'xUnit --filter expression (empty = full suite)'
        required: false
        default: ''

jobs:
  ui-tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Start Playwright stack
        # --wait fails the step if a container exits / never reaches healthy within the timeout
        # (compose `up -d` alone returns success even when a container immediately crashes).
        run: docker compose -f docker-compose.yml -f docker-compose.playwright.yml up -d --build --wait --wait-timeout 180

      - name: Wait for readiness
        # BOUNDED — never an open-ended `until curl; do sleep; done`. A stack that comes up but
        # doesn't serve health must FAIL FAST with diagnostics, not hang until the job's 6h limit.
        run: |
          compose() { docker compose -f docker-compose.yml -f docker-compose.playwright.yml "$@"; }
          wait_for() {  # url  name  [timeout_seconds]
            local url="$1" name="$2" timeout="${3:-120}" start=$SECONDS
            until curl -sf "$url" >/dev/null 2>&1; do
              if [ $((SECONDS - start)) -ge "$timeout" ]; then
                echo "::error::$name not ready at $url after ${timeout}s — dumping stack state:"
                compose ps || true
                compose logs --tail=200 || true
                exit 1
              fi
              sleep 3
            done
            echo "$name ready ($url)"
          }
          wait_for http://localhost:5001/health/ready "API health" 120
          wait_for http://localhost:5002 "Client" 120

      - name: Install Playwright browser (node-based, pwsh-free)
        # The tests run via `dotnet test` on the runner, so the browser must be installed
        # locally. Use node (not pwsh — not present on Linux runners); it's the mechanism
        # `playwright.ps1` wraps. Drop `--with-deps` if the runner's OS libs are already set
        # up (it needs root); keep it on a fresh runner that's missing the system libraries.
        run: |
          dotnet build tests/{ProjectName}.Playwright.Tests/
          node tests/{ProjectName}.Playwright.Tests/bin/Debug/net10.0/.playwright/package/cli.js install chromium --with-deps

      - name: Run UI tests
        env:
          # YAML key is quoted because the {PROJECT} token starts with a brace.
          "{PROJECT}_BASE_URL": http://localhost:5002
        run: |
          if [ -n "${{ inputs.filter }}" ]; then
            dotnet test tests/{ProjectName}.Playwright.Tests/ --filter "${{ inputs.filter }}"
          else
            dotnet test tests/{ProjectName}.Playwright.Tests/
          fi

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.playwright.yml down
